apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "my-apache-chart.fullname" . }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: aman-app1.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "my-apache-chart.fullname" . }}
                port:
                  number: 80
