apiVersion: apps/v1
kind: Deployment
metadata:
  name: testingargo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: testingargo
  template:
    metadata:
      labels:
        app: testingargo
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: node-app
        image: ghcr.io/amansinghalkeen/testingargo-app:v14
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: testingargo 
spec:
  type: NodePort
  selector:
    app: testingargo
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30001
